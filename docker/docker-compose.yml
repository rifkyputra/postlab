services:
  fedora-dev:
    build: ./fedora-dev
    platform: linux/amd64
    container_name: postlab-fedora-dev
    privileged: true          # required for systemd as PID 1
    ports:
      - "3001:3000"   # API
      - "8080:8080"   # web dashboard
    volumes:
      - ../:/workspace
      - cargo-cache:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
      - target-linux:/workspace/target   # isolated from macOS target/
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    environment:
      DATABASE_URL: sqlite:///workspace/postlab-fedora.db?mode=rwc
    working_dir: /workspace

volumes:
  cargo-cache:
  cargo-git:
  target-linux:
